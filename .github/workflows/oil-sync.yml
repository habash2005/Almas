name: Oil inventory sync

on:
  schedule:
    # Daily at 09:00 UTC (~4/5am ET) — reconciles the shared oil pools
    # against overnight sales and updates variant availability.
    - cron: '0 9 * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sync oil pools
        env:
          SHOPIFY_STORE_DOMAIN: t4nj18-gm.myshopify.com
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
        run: node scripts/oil-inventory.mjs sync
